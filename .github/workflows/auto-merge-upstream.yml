name: Auto Merge Upstream
 
on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
 
jobs: # 执行的工作
  run_update_python:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: harren-collections/update-code
          token: ${{ secrets.G_TOKEN }}
 
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13' 

      - name: Install dependencies
        run: pip install -r requirements.txt || echo "No dependencies"
 
      - name: Run script
        env:
          G_TOKEN: ${{ secrets.G_TOKEN }}
        run: python actions.py

      - name: Checkout current repo status branch
        uses: actions/checkout@v6
        with:
          ref: status
          path: current-repo
          token: ${{ secrets.G_TOKEN }}

      - name: Update task file with current timestamp
        working-directory: current-repo
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > task

      - name: Commit and push task file
        working-directory: current-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add task
          git diff --cached --quiet || git commit -m "chore: update task timestamp"
          git push origin status
